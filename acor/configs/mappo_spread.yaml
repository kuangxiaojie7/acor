experiment:
  env_name: mpe_simple_spread_v3
  num_envs: 16
  max_cycles: 50
  seed: 42
  log_interval: 5
  checkpoint_interval: 100

baseline:
  hidden_dim: 256

train:
  lr: 0.0003
  total_updates: 2000
  rollout_length: 64
  update_epochs: 4
  minibatch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5

hardware:
  device: cuda
  backend: nccl
