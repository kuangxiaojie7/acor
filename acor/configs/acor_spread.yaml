experiment:
  env_name: mpe_simple_spread_v3
  num_envs: 16
  max_cycles: 50
  seed: 42
  log_interval: 5
  checkpoint_interval: 100

model:
  k_neighbors: 4
  leader_k: 3
  obs_hidden: 256
  obs_embed: 128
  obs_dim: 18
  feature_dim: 128
  message_dim: 128
  policy_hidden: 256
  value_hidden: 256
  leader_hidden: 128
  trust_hidden: 128
  behavior_hidden: 128
  behavior_latent: 64
  behavior_input: 23  # obs (18) + one-hot action (5)
  history_window: 8
  intra_steps: 2
  inter_steps: 1
  group_temp: 0.5

train:
  lr: 0.0003
  adam_eps: 1.0e-8
  weight_decay: 0.0
  total_updates: 2000
  rollout_length: 64
  update_epochs: 4
  minibatch_size: 64
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  use_amp: true

hardware:
  device: cuda
  backend: nccl
